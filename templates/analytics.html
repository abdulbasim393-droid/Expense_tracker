<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker - Analytics</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='dashboard.css') }}">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<div class="layout">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2>ExpenseX</h2>

        <a href="{{ url_for('dashboard') }}">Dashboard</a>
        <a href="{{ url_for('add') }}">Add Expense</a>
        <a href="{{ url_for('analytics_page') }}" class="active">Analytics</a>

        <button onclick="logout()">Logout</button>
    </div>

    <!-- Main -->
    <div class="main">

        <div class="page-header">
            <div>
                <h1>Analytics</h1>
                <p>View spending insights and trends.</p>
            </div>
        </div>

        <!-- Summary Cards -->
        <div class="summary-cards">

            <div class="card">
                <h3>Total Expenses</h3>
                <h2 id="totalExpense">₹0</h2>
            </div>

            <div class="card">
                <h3>Top Category</h3>
                <h2 id="topCategory">-</h2>
            </div>

            <div class="card">
                <h3>Average Daily</h3>
                <h2 id="averageDaily">₹0</h2>
            </div>

        </div>

        <!-- Charts -->
        <div class="charts">

            <div class="chart-box">
                <h3>Category Breakdown</h3>
                <canvas id="categoryChart"></canvas>
            </div>

            <div class="chart-box">
                <h3>Monthly Trend</h3>
                <canvas id="monthlyChart"></canvas>
            </div>

            <div class="chart-box">
                <h3>Last 30 Days</h3>
                <canvas id="dailyChart"></canvas>
            </div>

        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='app.js') }}"></script>

</body>
</html>
