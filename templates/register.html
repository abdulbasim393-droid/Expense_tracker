<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='auth.css') }}">
</head>
<body>

<div class="auth-card">
    <h2>Register</h2>

    <input id="username" class="auth-input" placeholder="Username">
    <input id="email" class="auth-input" placeholder="Email">
    <input id="password" class="auth-input" type="password" placeholder="Password">

    <button class="auth-btn" onclick="register()">Sign Up</button>

    <div class="auth-link">
        <a href="/login">Already have account?</a>
    </div>
</div>

<script>
const API = "";

async function register() {
    const username = document.getElementById("username").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const res = await fetch(`${API}/register`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, email, password })
    });

    const data = await res.json();

    if (res.ok) {
        alert("Registered successfully");
        window.location.href = "/login";
    } else {
        alert(data.message || "Registration failed");
    }
}
</script>

</body>
</html>
